services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: monitoring-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - ${PROMETHEUS_PORT}:9090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./apps/monitoring/prometheus/rules:/etc/prometheus/rules:ro

  grafana:
    image: grafana/grafana:11.3.0
    container_name: monitoring-grafana
    depends_on:
      - prometheus
    ports:
      - ${GRAFANA_PORT}:3000
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./apps/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./apps/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  evidently-monitor:
    build:
      context: ./apps/monitoring/evidently
    container_name: evidently-monitor
    working_dir: /app
    volumes:
      - ${MONITORING_REPORTS_PATH}:/app/reports/monitoring
      - ${MODELS_PATH}:/app/models:ro
      - ./apps/monitoring/evidently/configs:/app/configs:ro
    environment:
      - PROM_EXPORT_PORT=9108
      - EVIDENTLY_INTERVAL_SECONDS=${EVIDENTLY_INTERVAL_SECONDS}
      - MONITORING_MODE=${MONITORING_MODE}
      - ENABLE_DETAILED_DATA_QUALITY_METRICS=${ENABLE_DETAILED_DATA_QUALITY_METRICS}
      - ENABLE_LABEL_BASED_METRICS=${ENABLE_LABEL_BASED_METRICS}
      - EVIDENTLY_REFERENCE_PATH=/app/reports/monitoring/evidently/reference.parquet
      - EVIDENTLY_CURRENT_PATH=/app/reports/monitoring/inference_events/events.jsonl
      - CATEGORY=${CATEGORY}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      - MLFLOW_MODEL_NAME=${MLFLOW_MODEL_NAME}
      - MLFLOW_MODEL_VERSION=${MLFLOW_MODEL_VERSION}
      - MLFLOW_RUN_ID=${MLFLOW_RUN_ID}
    command: ["python", "-m", "src.run_monitoring"]

networks:
  default:
    name: monitoring-network
