global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prediction-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: evidently-monitor
    metrics_path: /metrics
    static_configs:
      - targets: ["evidently-monitor:9108"]
