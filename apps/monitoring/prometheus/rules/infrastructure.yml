groups:
  - name: infrastructure
    rules:
      - alert: HostCPUUsageHigh
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU usage is above 85%"

      - alert: HostMemoryUsageHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage is above 90%"

      - alert: HostDiskUsageHigh
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 90
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Host disk usage is above 90%"
